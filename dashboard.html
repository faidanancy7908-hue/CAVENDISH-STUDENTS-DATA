<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Cavendish University Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 4px
    }

    .sidebar-scroll::-webkit-scrollbar-track {
      background: transparent
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px
    }
  </style>
</head>

<body class="bg-slate-50 flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div id="sidebar-wrapper"
    class="fixed lg:static inset-y-0 left-0 z-40 w-64 bg-slate-900 flex-shrink-0 transition-transform duration-300 -translate-x-full lg:translate-x-0 sidebar-scroll overflow-y-auto">
    <div id="sidebar"></div>
  </div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Topbar -->
    <header
      class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between flex-shrink-0 shadow-sm">
      <div id="topbar"></div>
    </header>
    <!-- Main -->
    <main class="flex-1 overflow-y-auto p-6">
      <div id="app"></div>
    </main>
  </div>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const session = buildPage('dashboard.html', 'Dashboard');
    if (!session) throw new Error('No session');

    function render() {
      const db = getDB();
      const s = db.students, c = db.courses, e = db.enrollments, f = db.finance;
      const totalStudents = s.length;
      const activeStudents = s.filter(x => x.status === 'active').length;
      const totalCourses = c.length;
      const totalEnrollments = e.length;
      const cleared = f.filter(x => x.cleared).length;
      const outstanding = f.reduce((a, x) => a + x.balance, 0);
      const totalRevenue = f.reduce((a, x) => a + x.amountPaid, 0);

      // Role-specific greeting
      const greetings = { admin: 'Full system overview', registry: 'Student & enrollment overview', finance: 'Financial overview', lecturer: 'Your courses & grades', student: 'Your academic summary' };

      // Stat cards based on role
      let statsHTML = '';
      if (['admin', 'registry'].includes(session.role)) {
        statsHTML = `
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">
        ${statCard('Total Students', totalStudents, 'of ' + activeStudents + ' active', 'bg-blue-500', 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z')}
        ${statCard('Courses Offered', totalCourses, 'This semester', 'bg-indigo-500', 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253')}
        ${statCard('Total Enrollments', totalEnrollments, 'Across all courses', 'bg-purple-500', 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2')}
        ${statCard('Financial Clearance', cleared + '/' + s.length, 'Students cleared', 'bg-emerald-500', 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0')}
      </div>`;
      } else if (session.role === 'finance') {
        statsHTML = `
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">
        ${statCard('Total Revenue', 'KES ' + totalRevenue.toLocaleString(), 'Collected this semester', 'bg-emerald-500', 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0')}
        ${statCard('Outstanding Fees', 'KES ' + outstanding.toLocaleString(), 'Pending collection', 'bg-red-500', 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3')}
        ${statCard('Students Cleared', cleared, 'Financially cleared', 'bg-blue-500', 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0')}
        ${statCard('Total Students', totalStudents, 'Registered students', 'bg-purple-500', 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0')}
      </div>`;
      } else if (session.role === 'lecturer') {
        const myCourses = c.filter(x => x.lecturerId === session.id);
        const myResults = db.results.filter(x => x.gradedBy === session.id);
        const myEnrollments = e.filter(x => myCourses.some(mc => mc.courseCode === x.courseCode));
        statsHTML = `
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5 mb-8">
        ${statCard('My Courses', myCourses.length, 'Assigned this semester', 'bg-indigo-500', 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253')}
        ${statCard('Students to Grade', myEnrollments.length, 'Total enrollments', 'bg-purple-500', 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0')}
        ${statCard('Grades Entered', myResults.length, 'Results submitted', 'bg-emerald-500', 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2')}
      </div>`;
      } else if (session.role === 'student') {
        const stu = db.students.find(x => x.studentId === session.studentId);
        const fin = db.finance.find(x => x.studentId === session.studentId);
        const myEnroll = e.filter(x => x.studentId === session.studentId);
        const myResults = db.results.filter(x => x.studentId === session.studentId);
        const gpaData = Results.calcGPA(session.studentId);
        statsHTML = `
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">
        ${statCard('My Program', stu ? stu.program : '—', 'Year ' + (stu ? stu.year : '?'), 'bg-indigo-500', 'M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14')}
        ${statCard('Enrolled Courses', myEnroll.length, 'This semester', 'bg-blue-500', 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253')}
        ${statCard('Current GPA', gpaData.gpa, 'CGPA: ' + gpaData.cgpa, 'bg-purple-500', 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2')}
        ${statCard('Fee Balance', fin ? 'KES ' + fin.balance.toLocaleString() : '—', fin && fin.cleared ? '✓ Cleared' : 'Pending', fin && fin.cleared ? 'bg-emerald-500' : 'bg-red-500', 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0')}
      </div>`;
      }

      // Build tables
      let recentHTML = '';
      if (['admin', 'registry'].includes(session.role)) {
        const recent = [...db.students].reverse().slice(0, 5);
        recentHTML = `
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h3 class="font-semibold text-slate-800">Recent Students</h3>
          <a href="students.html" class="text-indigo-600 text-sm font-medium hover:underline">View all →</a>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50"><tr>
              <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Student</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Program</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Year</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
            </tr></thead>
            <tbody class="divide-y divide-slate-100">
              ${recent.map(st => `<tr class="hover:bg-slate-50 transition-colors">
                <td class="px-6 py-4"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-xs">${st.name.charAt(0)}</div><div><div class="font-medium text-slate-800">${st.name}</div><div class="text-slate-400 text-xs">${st.studentId}</div></div></div></td>
                <td class="px-6 py-4 text-slate-600">${st.program}</td>
                <td class="px-6 py-4 text-slate-600">Year ${st.year}</td>
                <td class="px-6 py-4">${statusBadge(st.status)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
      } else if (session.role === 'finance') {
        const outstanding_list = db.finance.filter(x => !x.cleared).slice(0, 5);
        recentHTML = `
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h3 class="font-semibold text-slate-800">Outstanding Balances</h3>
          <a href="finance.html" class="text-indigo-600 text-sm font-medium hover:underline">View all →</a>
        </div>
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-slate-50"><tr>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Student</th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Total Fees</th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Balance</th>
          </tr></thead>
          <tbody class="divide-y divide-slate-100">
            ${outstanding_list.map(fi => { const st = db.students.find(x => x.studentId === fi.studentId); return `<tr class="hover:bg-slate-50"><td class="px-6 py-4 font-medium text-slate-800">${st ? st.name : fi.studentId}</td><td class="px-6 py-4 text-slate-600">${fmtCurrency(fi.totalFees)}</td><td class="px-6 py-4 text-red-600 font-semibold">${fmtCurrency(fi.balance)}</td></tr>`; }).join('')}
          </tbody>
        </table></div>
      </div>`;
      } else if (session.role === 'student') {
        const myEnroll = e.filter(x => x.studentId === session.studentId);
        recentHTML = `
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100"><h3 class="font-semibold text-slate-800">My Enrolled Courses</h3></div>
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-slate-50"><tr>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Course</th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Credits</th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Grade</th>
          </tr></thead>
          <tbody class="divide-y divide-slate-100">
            ${myEnroll.map(en => { const co = db.courses.find(x => x.courseCode === en.courseCode); const res = db.results.find(x => x.studentId === session.studentId && x.courseCode === en.courseCode); return `<tr class="hover:bg-slate-50"><td class="px-6 py-4"><div class="font-medium text-slate-800">${co ? co.title : en.courseCode}</div><div class="text-xs text-slate-400">${en.courseCode}</div></td><td class="px-6 py-4 text-slate-600">${co ? co.creditUnits : '—'}</td><td class="px-6 py-4 ${res ? gradeColor(res.grade) : 'text-slate-400'}">${res ? res.grade : 'Pending'}</td></tr>`; }).join('') || emptyState('No courses enrolled')}
          </tbody>
        </table></div>
      </div>`;
      } else if (session.role === 'lecturer') {
        const myCourses = c.filter(x => x.lecturerId === session.id);
        recentHTML = `
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between"><h3 class="font-semibold text-slate-800">My Courses</h3><a href="grades.html" class="text-indigo-600 text-sm font-medium hover:underline">Enter Grades →</a></div>
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-slate-50"><tr>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Course</th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Code</th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Students</th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Graded</th>
          </tr></thead>
          <tbody class="divide-y divide-slate-100">
            ${myCourses.map(co => { const enrolled = e.filter(x => x.courseCode === co.courseCode).length; const graded = db.results.filter(x => x.courseCode === co.courseCode).length; return `<tr class="hover:bg-slate-50"><td class="px-6 py-4 font-medium text-slate-800">${co.title}</td><td class="px-6 py-4 text-slate-500 font-mono text-xs">${co.courseCode}</td><td class="px-6 py-4 text-slate-600">${enrolled}</td><td class="px-6 py-4"><span class="${graded >= enrolled ? 'text-emerald-600' : 'text-amber-600'} font-medium">${graded}/${enrolled}</span></td></tr>`; }).join('') || emptyState('No courses assigned')}
          </tbody>
        </table></div>
      </div>`;
      }

      // Charts data
      const programCounts = {};
      s.forEach(st => { programCounts[st.program] = (programCounts[st.program] || 0) + 1; });
      const chartLabels = Object.keys(programCounts);
      const chartData = Object.values(programCounts);

      document.getElementById('app').innerHTML = `
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-slate-800">Good ${getGreeting()}, ${session.name.split(' ')[0]} 👋</h2>
      <p class="text-slate-500 text-sm mt-1">${greetings[session.role]}</p>
    </div>
    ${statsHTML}
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
      <div class="xl:col-span-2">${recentHTML}</div>
      <div class="bg-white rounded-2xl border border-slate-200 p-6">
        <h3 class="font-semibold text-slate-800 mb-4">Students by Program</h3>
        <canvas id="programChart" height="220"></canvas>
      </div>
    </div>`;

      // Chart
      const ctx = document.getElementById('programChart').getContext('2d');
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: chartLabels,
          datasets: [{ data: chartData, backgroundColor: ['#6366f1', '#8b5cf6', '#06b6d4', '#10b981', '#f59e0b', '#ef4444'], borderWidth: 0, hoverOffset: 4 }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { padding: 16, font: { size: 11 } } } }, cutout: '65%' }
      });
    }

    function statCard(label, value, sub, color, path) {
      return `<div class="bg-white rounded-2xl border border-slate-200 p-6 flex items-start gap-4 hover:shadow-md transition-shadow">
    <div class="w-12 h-12 rounded-xl ${color} flex items-center justify-center flex-shrink-0">
      <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${path}"/></svg>
    </div>
    <div><div class="text-2xl font-bold text-slate-800">${value}</div><div class="text-slate-500 text-sm font-medium">${label}</div><div class="text-slate-400 text-xs mt-0.5">${sub}</div></div>
  </div>`;
    }
    function getGreeting() {
      const h = new Date().getHours();
      return h < 12 ? 'Morning' : h < 17 ? 'Afternoon' : 'Evening';
    }
    render();
  </script>
</body>

</html>
