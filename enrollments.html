<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enrollments — Cavendish University Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      font-family: 'Inter', sans-serif
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 4px
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px
    }

    .lbl {
      display: block;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: .25rem
    }

    .inp {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: .75rem;
      padding: .625rem 1rem;
      font-size: .875rem;
      outline: none;
      font-family: inherit
    }

    .inp:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .15)
    }
  </style>
<link rel="icon" type="image/png" href="assets/images/logo.png" />
</head>

<body class="bg-slate-50 flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <aside id="sidebar-wrapper"
    class="fixed lg:static inset-y-0 left-0 z-40 w-72 bg-[#0a0f1c] border-r border-white/5 flex-shrink-0 transition-transform duration-300 -translate-x-full lg:translate-x-0 sidebar-scroll overflow-y-auto">
    <div id="sidebar"></div>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden bg-slate-50">
    <!-- Topbar -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex items-center justify-between flex-shrink-0 z-30 shadow-sm">
      <div id="topbar" class="w-full flex items-center justify-between"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8 relative z-0">
      <div class="absolute inset-0 z-[-1] pointer-events-none opacity-5 mix-blend-multiply" style="background-image: url('assets/images/background.png'); background-size: cover; background-position: center; background-attachment: fixed;"></div>
      
      <div class="max-w-7xl mx-auto space-y-8">
        <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-6">
          <div>
            <h2 class="text-2xl font-black text-slate-900 tracking-tight leading-none">Enrollment Management</h2>
            <p class="text-sm text-slate-500 mt-2 font-medium">Coordinate course participation and academic tracking</p>
          </div>
          <div class="flex items-center gap-3">
            <div class="flex bg-white border border-slate-200 rounded-2xl p-1 shadow-sm">
              <select id="semFilter" onchange="renderTable()"
                class="bg-transparent border-none px-4 py-2 text-[10px] font-black uppercase tracking-widest text-slate-600 focus:outline-none cursor-pointer">
                <option value="">All Semesters</option>
                <option value="2024/1">2024 Sem 1</option>
                <option value="2024/2">2024 Sem 2</option>
              </select>
            </div>
            <div class="relative group">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-indigo-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0" />
              </svg>
              <input type="text" placeholder="Search records..." oninput="filterTable('enrTable',this.value)"
                class="pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all w-56 shadow-sm" />
            </div>
            <button id="addBtn" onclick="openAdd()"
              class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" /></svg>
              Enroll Student
            </button>
          </div>
        </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6" id="statsRow"></div>

      <!-- Data Table Container -->
      <div class="bg-white rounded-[24px] border border-slate-200 overflow-hidden shadow-xl shadow-slate-200/40">
        <div class="overflow-x-auto">
          <table id="enrTable" class="w-full text-sm">
            <thead>
              <tr class="bg-slate-50/50 border-b border-slate-200">
                <th class="px-8 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">#</th>
                <th class="px-8 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Identity</th>
                <th class="px-8 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Academic Unit</th>
                <th class="px-8 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Term</th>
                <th class="px-8 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Date Joined</th>
                <th class="px-8 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th>
                <th class="px-8 py-5 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">Actions</th>
              </tr>
            </thead>
            <tbody id="enrBody" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
        <div id="enrCount" class="px-8 py-4 border-t border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50/30"></div>
      </div>
    </main>
  </div>

  <!-- Enroll Modal -->
  <div id="enrModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
      <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
        <h3 class="text-lg font-bold text-slate-800">Enroll Student in Course</h3>
        <button onclick="closeModal('enrModal')"
          class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100"><svg class="w-5 h-5" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg></button>
      </div>
      <form id="enrForm" onsubmit="saveEnrollment(event)" class="p-6 space-y-4">
        <div><label class="lbl">Student *</label>
          <select id="e_student" required class="inp" onchange="checkStudentStatus()">
            <option value="">Select student…</option>
          </select>
          <div id="stuStatusMsg" class="mt-1 text-xs"></div>
        </div>
        <div><label class="lbl">Course *</label>
          <select id="e_course" required class="inp">
            <option value="">Select course…</option>
          </select>
        </div>
        <div><label class="lbl">Semester *</label>
          <select id="e_sem" required class="inp">
            <option value="2024/1">2024 Semester 1</option>
            <option value="2024/2">2024 Semester 2</option>
            <option value="2025/1">2025 Semester 1</option>
          </select>
        </div>
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">
          ⚠ System will check student is <strong>Active</strong> before enrollment. Duplicate enrollments for the same
          semester are blocked.
        </div>
        <div class="flex justify-end gap-3 pt-2 border-t border-slate-100">
          <button type="button" onclick="closeModal('enrModal')"
            class="px-5 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button type="submit"
            class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-medium">Enroll</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const session = buildPage('enrollments.html', 'Enrollments');
    const isStudent = session.role === 'student';
    const canManage = ['admin', 'registry'].includes(session.role);
    if (!canManage && !isStudent) { toast('Access denied', 'error'); setTimeout(() => window.location.href = 'dashboard.html', 1500); }
    if (!canManage) document.getElementById('addBtn').classList.add('hidden');

    function renderStats() {
      const all = Enrollments.all();
      const sems = [...new Set(all.map(e => e.semester))];
      document.getElementById('statsRow').innerHTML = [
        ['Total Enrollments', all.length, 'Academic records', 'from-indigo-500 to-purple-600', 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2'],
        ['Active Students', [...new Set(all.map(e => e.studentId))].length, 'Participation', 'from-blue-500 to-indigo-600', 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z'],
        ['Active Semesters', sems.length, 'Term frequency', 'from-emerald-500 to-teal-600', 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z'],
      ].map(([l, v, s, color, path]) => `
      <div class="group bg-white rounded-[24px] p-6 border border-slate-200 hover:border-indigo-500/30 hover:shadow-xl hover:shadow-indigo-500/5 transition-all duration-500 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-br ${color} opacity-[0.03] rounded-full translate-x-8 -translate-y-8 group-hover:scale-150 transition-transform duration-700"></div>
        <div class="flex items-start gap-4 relative z-10">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br ${color} flex items-center justify-center flex-shrink-0 shadow-lg shadow-indigo-500/20">
            <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${path}"/></svg>
          </div>
          <div>
            <div class="text-2xl font-black text-slate-900 leading-none tracking-tight">${v}</div>
            <div class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-2">${l}</div>
            <div class="text-slate-400 text-[9px] font-medium mt-1">${s}</div>
          </div>
        </div>
      </div>`).join('');
    }

    function renderTable() {
      let enrollments = Enrollments.all();
      if (isStudent) enrollments = enrollments.filter(e => e.studentId === session.studentId);
      const sem = document.getElementById('semFilter').value;
      if (sem) enrollments = enrollments.filter(e => e.semester === sem);
      document.getElementById('enrCount').textContent = `${enrollments.length} enrollment(s)`;
      document.getElementById('enrBody').innerHTML = enrollments.length ? enrollments.map((e, i) => {
        const stu = Students.find(e.studentId);
        const cou = Courses.find(e.courseCode);
        const result = getDB().results.find(r => r.studentId === e.studentId && r.courseCode === e.courseCode && r.semester === e.semester);
        return `<tr class="hover:bg-slate-50 transition-colors">
      <td class="px-6 py-4 text-slate-400 text-xs font-mono">${String(i + 1).padStart(3, '0')}</td>
      <td class="px-6 py-4"><div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-xs flex-shrink-0">${stu ? stu.name.charAt(0) : '?'}</div>
        <div><div class="font-medium text-slate-800">${stu ? stu.name : e.studentId}</div><div class="text-slate-400 text-xs">${e.studentId}</div></div></div></td>
      <td class="px-6 py-4"><div class="font-medium text-slate-800">${cou ? cou.title : e.courseCode}</div><div class="font-mono text-xs text-slate-400">${e.courseCode} · ${cou ? cou.creditUnits + 'cr' : ''}</div></td>
      <td class="px-6 py-4"><span class="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-md font-medium">${e.semester}</span></td>
      <td class="px-6 py-4 text-slate-500 text-xs">${fmtDate(e.enrolledDate)}</td>
      <td class="px-6 py-4">${result ? `<span class="text-xs px-2 py-1 rounded-full bg-emerald-100 text-emerald-700 font-medium">Graded: ${result.grade}</span>` : '<span class="text-xs px-2 py-1 rounded-full bg-amber-100 text-amber-700">Awaiting Grade</span>'}</td>
      <td class="px-6 py-4 text-right">${canManage ? `<button onclick="removeEnrollment(${e.id})" class="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg" title="Remove"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>` : '—'}</td>
    </tr>`;
      }).join('') : emptyState('No enrollments found');
    }

    function openAdd() {
      document.getElementById('enrForm').reset();
      document.getElementById('stuStatusMsg').textContent = '';
      // Populate students
      const sSel = document.getElementById('e_student');
      sSel.innerHTML = '<option value="">Select student…</option>';
      Students.all().forEach(s => { const o = document.createElement('option'); o.value = s.studentId; o.textContent = `${s.name} (${s.studentId})`; sSel.appendChild(o); });
      // Populate courses
      const cSel = document.getElementById('e_course');
      cSel.innerHTML = '<option value="">Select course…</option>';
      Courses.all().forEach(c => { const o = document.createElement('option'); o.value = c.courseCode; o.textContent = `${c.courseCode} — ${c.title}`; cSel.appendChild(o); });
      openModal('enrModal');
    }

    function checkStudentStatus() {
      const sid = document.getElementById('e_student').value;
      const msg = document.getElementById('stuStatusMsg');
      if (!sid) { msg.textContent = ''; return; }
      const stu = Students.find(sid);
      if (stu && stu.status === 'active') { msg.className = 'mt-1 text-xs text-emerald-600 font-medium'; msg.textContent = '✓ Student is active — eligible for enrollment'; }
      else { msg.className = 'mt-1 text-xs text-red-600 font-medium'; msg.textContent = '✗ Student is inactive — enrollment blocked'; }
    }

    function saveEnrollment(e) {
      e.preventDefault();
      const data = { studentId: document.getElementById('e_student').value, courseCode: document.getElementById('e_course').value, semester: document.getElementById('e_sem').value };
      try { Enrollments.create(data); toast('Student enrolled successfully'); closeModal('enrModal'); renderTable(); renderStats(); }
      catch (err) { toast(err.message, 'error'); }
    }

    function removeEnrollment(id) {
      if (!confirmDialog('Remove this enrollment?')) return;
      Enrollments.delete(id); toast('Enrollment removed', 'warning'); renderTable(); renderStats();
    }

    renderStats(); renderTable();
  </script>
</body>

</html>
